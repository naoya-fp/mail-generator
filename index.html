<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mail Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Hiragino Kaku Gothic ProN","Meiryo",sans-serif;font-size:15px;color:#222;background:#f5f6fa;min-height:100vh}
a{color:#4949FF}

/* ===== Layout ===== */
.app-header{background:#4949FF;color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(73,73,255,.35)}
.app-header h1{font-size:19px;font-weight:700;letter-spacing:.5px}
.header-actions{display:flex;gap:6px}
.btn-nav{background:rgba(255,255,255,.13);color:#fff;border:1.5px solid rgba(255,255,255,.28);border-radius:7px;padding:6px 16px;font-size:13px;font-weight:600;letter-spacing:.2px;transition:all .15s}
.btn-nav:hover{background:rgba(255,255,255,.26);border-color:rgba(255,255,255,.55);color:#fff}

main{max-width:920px;margin:0 auto;padding:24px 16px}
.view{display:none}
.view.active{display:block}

/* ===== Card ===== */
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:20px;overflow:hidden}
.card-header{padding:14px 20px;background:#f0f0ff;border-bottom:1px solid #e0e0ff;display:flex;align-items:center;justify-content:space-between}
.card-header h2{font-size:15px;font-weight:600;color:#333}
.card-body{padding:16px 20px}

/* ===== Form elements ===== */
label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:5px}
input[type=text],input[type=date],select,textarea{
  width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:8px;
  font-size:14px;font-family:inherit;color:#222;
  transition:border-color .2s;outline:none;background:#fff
}
input[type=text]:focus,input[type=date]:focus,select:focus,textarea:focus{border-color:#4949FF;box-shadow:0 0 0 3px rgba(73,73,255,.12)}
textarea{resize:vertical;line-height:1.6;font-family:"MS Gothic","Courier New",monospace;font-size:13px}
textarea.body-textarea{height:460px}
textarea.header-footer-textarea{height:180px;background:#fafafa}
select{cursor:pointer;background:#fff}

/* ===== Buttons ===== */
button{cursor:pointer;border:none;border-radius:8px;font-size:13px;font-weight:600;padding:8px 16px;transition:all .15s;font-family:inherit}
.btn-primary{background:#4949FF;color:#fff}
.btn-primary:hover{background:#3535cc}
.btn-secondary{background:#6b7280;color:#fff}
.btn-secondary:hover{background:#4b5563}
.btn-success{background:#16a34a;color:#fff}
.btn-success:hover{background:#15803d}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-outline{background:#fff;color:#4949FF;border:1.5px solid #4949FF}
.btn-outline:hover{background:#f0f0ff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-tag{background:#e0e0ff;color:#4949FF;padding:4px 10px;font-size:12px;border-radius:6px;margin:0 2px}
.btn-tag:hover{background:#c8c8ff}
button:disabled{opacity:.5;cursor:not-allowed}

/* ===== Inline groups ===== */
.inline-group{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.inline-group > *{flex-shrink:0}
.inline-group > input{flex:1;min-width:120px}

/* ===== Date area ===== */
.date-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.date-row input{width:130px}

/* ===== Body toolbar ===== */
.body-toolbar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding-bottom:12px;margin-bottom:12px;border-bottom:1.5px solid #ebebff}
.toolbar-group{display:flex;align-items:center;gap:4px}
.toolbar-label{font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.6px;margin-right:3px;white-space:nowrap}
.toolbar-sep{width:1px;height:18px;background:#dde;margin:0 6px;flex-shrink:0}
.btn-tool{background:#f4f4f8;color:#555;border:1.5px solid #e2e2ee;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;transition:all .15s}
.btn-tool:hover{background:#eaeaff;color:#4949FF;border-color:#c0c0ff}

/* ===== Nametag area ===== */

.nametag-replace{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:10px}
.nametag-replace .form-item{flex:1;min-width:160px}
.nametag-replace label{margin-bottom:4px}

/* ===== Diff area ===== */
.diff-container{display:none;border:1.5px solid #ddd;border-radius:10px;overflow:hidden;margin-bottom:16px}
.diff-container.show{display:block}
.diff-header{background:#f8f8f8;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #ddd}
.diff-header span{font-size:13px;color:#555}
.diff-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.diff-col{padding:12px;overflow-x:auto}
.diff-col:first-child{border-right:1px solid #ddd;background:#fff8f8}
.diff-col:last-child{background:#f8fff8}
.diff-col h3{font-size:11px;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.diff-col:first-child h3{color:#c62828}
.diff-col:last-child h3{color:#2e7d32}
.diff-text{font-family:monospace;font-size:12px;white-space:pre-wrap;word-break:break-all;line-height:1.6;max-height:240px;overflow-y:auto}
.diff-deleted{background:#ffebee;text-decoration:line-through;color:#c62828;padding:0 2px;border-radius:2px}
.diff-added{background:#e8f5e9;color:#2e7d32;font-weight:700;padding:0 2px;border-radius:2px}

/* ===== Char check result ===== */
.char-check-result{display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:8px}
.char-check-result.ok{background:#dcfce7;color:#15803d;border:1px solid #86efac}
.char-check-result.error{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
.dep-char-preview{display:none;border:1.5px solid #fca5a5;border-radius:8px;padding:12px 16px;margin-bottom:10px;background:#fff;max-height:320px;overflow-y:auto;font-family:"MS Gothic","Courier New",monospace;font-size:13px;white-space:pre-wrap;word-break:break-all;line-height:1.8}
.dep-char-preview.show{display:block}
mark.dep-char{background:#fef08a;color:#b91c1c;font-weight:700;border-radius:2px;padding:0 1px}

/* ===== Copy success ===== */
.copy-success{display:none;padding:8px 14px;background:#dcfce7;color:#15803d;border-radius:8px;font-size:13px;border:1px solid #86efac}

/* ===== Preset list ===== */
.preset-list{display:none}
.preset-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:6px;background:#fafafa;font-size:13px}
.preset-item-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preset-item-actions{display:flex;gap:6px;flex-shrink:0;margin-left:8px}

/* ===== Admin ===== */
.admin-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.media-item{border:1.5px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-bottom:12px}
.media-item-header{padding:12px 16px;background:#f9fafb;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.media-item-header:hover{background:#f0f0ff}
.media-item-title{font-weight:600;font-size:14px;color:#333}
.media-item-id{font-size:12px;color:#888;margin-right:8px}
.media-item-actions{display:flex;gap:6px}
.media-edit-form{display:none;padding:16px;border-top:1px solid #e5e7eb;background:#fff}
.media-edit-form.open{display:block}
.media-edit-form .form-row{margin-bottom:14px}
.media-edit-form label{font-size:12px;font-weight:600;color:#666;margin-bottom:4px}
.media-edit-form input[type=text]{max-width:320px}
.delivery-time-row{display:flex;gap:8px;align-items:center}
.delivery-time-row select{width:80px}
.media-edit-form .btn-row{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid #eee}

/* ===== Toast ===== */
#toast{position:fixed;bottom:24px;right:24px;background:#222;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transform:translateY(20px);transition:all .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}

/* ===== Util ===== */
.text-muted{color:#888;font-size:12px}
.mt-2{margin-top:8px}
.mb-1{margin-bottom:4px}
.mb-2{margin-bottom:8px}
.section-title{font-size:14px;font-weight:700;color:#444;margin-bottom:12px}
.empty-state{text-align:center;padding:32px;color:#aaa;font-size:14px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-primary{background:#e0e0ff;color:#4949FF}
.badge-gray{background:#f3f4f6;color:#6b7280}
hr{border:none;border-top:1px solid #eee;margin:16px 0}

/* ===== Admin Drag Reorder ===== */
.drag-handle{cursor:grab;color:#bbb;padding:0 8px 0 0;user-select:none;font-size:18px;line-height:1;vertical-align:middle}
.drag-handle:hover{color:#888}
.drag-handle:active{cursor:grabbing}
.media-item.dragging{opacity:0.4;border-style:dashed}
.media-item.drag-over{outline:2px dashed #4949FF;outline-offset:-2px;background:#f5f5ff}

/* ===== URL convert panel ===== */
.url-check-list{max-height:300px;overflow-y:auto;margin-bottom:12px;border:1.5px solid #e5e7eb;border-radius:8px}
.url-check-label{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-bottom:1px solid #f0f0f0;cursor:pointer;font-size:12px}
.url-check-label:last-child{border-bottom:none}
.url-check-label:hover{background:#f5f5ff}
.url-check-label input[type=checkbox]{margin-top:2px;flex-shrink:0;cursor:pointer;accent-color:#4949FF}
.url-check-label span{font-family:monospace;word-break:break-all;color:#333}

/* ===== Compare view diff override ===== */
#compareDiffContainer .diff-text{max-height:500px}

/* ===== Bookmarklet Modal ===== */
/* MM action section */
.mm-section{display:none;align-items:flex-start;gap:8px;flex-wrap:wrap;width:100%;border-top:1px solid #eee;padding-top:10px;margin-top:6px}
.mm-section.show{display:flex}
.mm-label{font-size:12px;color:#888;font-weight:600;width:100%}
.mm-drag-hint{font-size:11px;color:#5d4037;width:100%;padding:6px 12px;background:#fff8e1;border-radius:6px;border:1px solid #ffe082;line-height:1.7}
.btn-mm{background:#fff3e0;color:#e65100;border:1.5px solid #ffb74d;border-radius:8px;font-size:12px;font-weight:600;padding:7px 14px;cursor:grab;transition:all .15s;text-decoration:none;display:inline-block;font-family:inherit;user-select:none}
.btn-mm:hover{background:#ffe0b2;text-decoration:none;color:#e65100}
.btn-mm:active{cursor:grabbing}
</style>
</head>
<body>

<header class="app-header">
  <h1>Mail Generator</h1>
  <div class="header-actions">
    <button class="btn-nav" id="compareBtn">比較</button>
    <button class="btn-nav" id="adminBtn">管理画面</button>
  </div>
</header>

<!-- ========== MAIN VIEW ========== -->
<div id="mainView" class="view active">
<main>

  <!-- 媒体選択 -->
  <div class="card">
    <div class="card-body">
      <label for="mediaSelect">媒体を選択</label>
      <select id="mediaSelect">
        <option value="">-- 媒体を選択してください --</option>
      </select>
    </div>
  </div>

  <!-- ヘッダー -->
  <div class="card" id="headerCard" style="display:none">
    <div class="card-header">
      <h2>ヘッダー</h2>
    </div>
    <div class="card-body">
      <div class="date-row">
        <input type="text" id="dateInput" placeholder="例: 20260517" maxlength="8" style="width:140px">
        <input type="date" id="datePicker" style="width:150px">
        <button class="btn-secondary btn-sm" id="todayBtn">今日</button>
        <button class="btn-outline btn-sm" id="replaceDateBtn">日付置換</button>
      </div>
      <div id="dateError" style="color:#dc2626;font-size:12px;margin-bottom:6px"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <label for="advertiserInput" style="white-space:nowrap;font-size:13px;min-width:3.5em">広告主</label>
        <input type="text" id="advertiserInput" style="flex:1">
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <label for="subjectInput" style="white-space:nowrap;font-size:13px;min-width:3.5em">件名</label>
        <input type="text" id="subjectInput" placeholder="件名" style="flex:1;min-width:0">
        <button class="btn-tag" data-tag="<<:氏名:>>" data-target="subjectInput">フルネーム</button>
        <button class="btn-tag" data-tag="<<:SETTINGITEM_名字:>>" data-target="subjectInput">名字のみ</button>
      </div>
      <textarea class="header-footer-textarea" id="headerText"></textarea>
    </div>
  </div>

  <!-- ネームタグ置換 -->
  <div class="card">
    <div class="card-header"><h2>ネームタグ置換</h2></div>
    <div class="card-body">
      <div class="nametag-replace">
        <div class="form-item">
          <label>検索テキスト</label>
          <input type="text" id="searchText" placeholder="例: 山田太郎">
        </div>
        <div class="form-item">
          <label>置換タグ</label>
          <select id="replaceTag">
            <option value="">-- タグを選択 --</option>
            <option value="&lt;&lt;:氏名:&gt;&gt;">フルネーム　&lt;&lt;:氏名:&gt;&gt;</option>
            <option value="&lt;&lt;:SETTINGITEM_名字:&gt;&gt;">名字のみ　&lt;&lt;:SETTINGITEM_名字:&gt;&gt;</option>
          </select>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;padding-bottom:1px">
          <label style="visibility:hidden;font-size:12px">　</label>
          <div style="display:flex;gap:6px">
            <button class="btn-primary btn-sm" id="replaceAllBtn">一括置換</button>
            <button class="btn-outline btn-sm" id="savePresetBtn">プリセット保存</button>
          </div>
        </div>
      </div>
      <div id="replaceResult" style="display:none;font-size:13px;margin-bottom:8px"></div>
      <div id="presetList" class="preset-list"></div>
    </div>
  </div>

  <!-- 本文 -->
  <div class="card">
    <div class="card-header"><h2>本文</h2></div>
    <div class="card-body">
      <div class="body-toolbar">
        <div class="toolbar-group">
          <span class="toolbar-label">挿入</span>
          <button class="btn-tag" data-tag="<<:氏名:>>">フルネーム</button>
          <button class="btn-tag" data-tag="<<:SETTINGITEM_名字:>>">名字のみ</button>
        </div>
        <div class="toolbar-sep"></div>
        <div class="toolbar-group">
          <button class="btn-tool" id="checkCharsBtn">機種依存文字チェック</button>
          <button class="btn-tool" id="urlBulkBtn">URL一括変換</button>
          <button class="btn-tool" id="urlSelectBtn">URL個別変換</button>
        </div>
      </div>
      <div id="urlConvertPanel" style="display:none;background:#f5f5ff;border:1.5px solid #d0d0ff;border-radius:10px;padding:14px;margin-bottom:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span style="font-size:13px;font-weight:700;color:#4949FF">変換するURLを選択</span>
          <button class="btn-secondary btn-sm" id="closeUrlPanelBtn">閉じる</button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <button class="btn-outline btn-sm" id="urlSelectAllBtn">すべて選択</button>
          <button class="btn-outline btn-sm" id="urlSelectNoneBtn">すべて解除</button>
        </div>
        <div class="url-check-list" id="urlCheckList"></div>
        <button class="btn-primary btn-sm" id="urlApplyBtn">変換する</button>
      </div>
      <div id="charCheckResult" class="char-check-result" style="margin-bottom:10px"></div>
      <div id="depCharPreview" class="dep-char-preview"></div>
      <textarea class="body-textarea" id="bodyText" placeholder="本文を入力してください"></textarea>
    </div>
  </div>

  <!-- フッター -->
  <div class="card" id="footerCard" style="display:none">
    <div class="card-header"><h2>フッター</h2></div>
    <div class="card-body">
      <textarea class="header-footer-textarea" id="footerText"></textarea>
    </div>
  </div>

  <!-- アクションボタン -->
  <div class="card">
    <div class="card-body" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="btn-primary" id="downloadTextBtn">テキストDL</button>
      <button class="btn-primary" id="downloadHtmlBtn">HTML DL</button>
      <button class="btn-secondary" id="copyBtn">クリップボードにコピー</button>
      <div class="copy-success" id="copySuccess">コピーしました！</div>
      <div class="mm-section" id="mmSection">
        <span class="mm-label">メールマーケティング</span>
        <div class="mm-drag-hint">📌 ブックマークバーへドラッグして登録 → 配信システムのページで使用<br>クリックするとコードをコピーします（アドレスバーに貼り付けても使用可）</div>
        <a class="btn-mm" id="bmTextLink" href="javascript:void(0)" draggable="true" onclick="copyBmLinkHref(event,this)">📝 MM本文登録（テキスト）</a>
        <a class="btn-mm" id="bmHtmlLink" href="javascript:void(0)" draggable="true" onclick="copyBmLinkHref(event,this)">🌐 MM本文登録（HTML）</a>
        <a class="btn-mm" id="bmReserveLink" href="javascript:void(0)" draggable="true" onclick="copyBmLinkHref(event,this)">📅 配信予約セット</a>
      </div>
    </div>
  </div>

</main>
</div><!-- /mainView -->

<!-- ========== ADMIN VIEW ========== -->
<div id="adminView" class="view">
<main>
  <div class="card">
    <div class="card-header">
      <h2>媒体管理</h2>
      <button class="btn-secondary btn-sm" id="backToMainBtn">← メインへ戻る</button>
    </div>
    <div class="card-body">
      <div class="admin-toolbar">
        <button class="btn-primary" id="addMediaBtn">+ 媒体を追加</button>
        <button class="btn-success" id="exportJsonBtn">media.json書き出し</button>
        <button class="btn-outline" id="exportBtn">CSVエクスポート</button>
        <button class="btn-outline" id="importBtn">CSVインポート</button>
        <input type="file" id="importFile" accept=".csv" style="display:none">
        <div style="width:100%;font-size:12px;color:#888;margin-top:4px">💡 <b>media.json書き出し</b> → GitHubリポジトリのルートにコミットすると全ユーザーに反映されます</div>
      </div>
      <div id="mediaListContainer"></div>
    </div>
  </div>
</main>
</div><!-- /adminView -->

<!-- ========== COMPARE VIEW ========== -->
<div id="compareView" class="view">
<main>
  <div class="card">
    <div class="card-header">
      <h2>原稿比較</h2>
      <button class="btn-secondary btn-sm" id="backFromCompareBtn">← メインへ戻る</button>
    </div>
    <div class="card-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div>
          <label for="compareBeforeInput">変更前</label>
          <textarea id="compareBeforeInput" class="body-textarea" placeholder="変更前の本文を貼り付けてください"></textarea>
        </div>
        <div>
          <label for="compareAfterInput">変更後</label>
          <textarea id="compareAfterInput" class="body-textarea" placeholder="変更後の本文を貼り付けてください"></textarea>
        </div>
      </div>
      <button class="btn-primary" id="runCompareBtn">比較する</button>
    </div>
  </div>
  <div class="diff-container" id="compareDiffContainer">
    <div class="diff-header">
      <span>比較結果 — <strong id="compareDiffCount">0</strong> 行変更</span>
    </div>
    <div class="diff-body">
      <div class="diff-col">
        <h3>変更前</h3>
        <div class="diff-text" id="compareDiffBefore"></div>
      </div>
      <div class="diff-col">
        <h3>変更後</h3>
        <div class="diff-text" id="compareDiffAfter"></div>
      </div>
    </div>
  </div>
</main>
</div><!-- /compareView -->

<!-- Toast -->
<div id="toast"></div>

<!-- ========== DEFAULT TEMPLATE DATA ========== -->

// ========== Data Management ==========
function csvToMedia(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // strip BOM
  const lines = text.trim().split('\n').map(l => l.replace(/\r$/, '')).filter(l => l);
  if (lines.length < 2) return [];
  const NUM_COLS = 10; // positional: id,sortOrder,columnName,name,deliveryTime,deliverySystem,segmentId,fromName,header,footer
  return lines.slice(1).map(line => {
    const parts = line.split(',');
    while (parts.length > NUM_COLS) {
      parts[NUM_COLS - 1] += ',' + parts.splice(NUM_COLS, 1)[0];
    }
    const v = i => (parts[i] || '').replace(/\\n/g, '\n');
    return {
      id: v(0),
      sortOrder: parseInt(v(1), 10) || 0,
      columnName: v(2),
      name: v(3),
      deliveryTime: v(4) || '10:00',
      deliverySystem: v(5) || 'MM',
      segmentId: v(6),
      fromName: v(7),
      header: v(8),
      footer: v(9),
    };
  });
}

async function loadMedia() {
  // Try fetching shared media.json from GitHub Pages (enables admin updates for all users)
  try {
    const res = await fetch('./media.json', { cache: 'no-cache' });
    if (res.ok) {
      const data = await res.json();
      if (Array.isArray(data) && data.length) {
        saveMedia(data);
        return data;
      }
    }
  } catch(e) {}

  // Fall back to localStorage
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { return JSON.parse(raw); } catch(e) {}
  }

  // First run: load defaults and save
  const defaults = csvToMedia($('defaultTemplates').textContent);
  saveMedia(defaults);
  return defaults;
}

function saveMedia(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  mediaList = list;
}

function getNextId(list) {
  const maxId = list.reduce((m, item) => {
    const n = parseInt(item.id, 10);
    return isNaN(n) ? m : Math.max(m, n);
  }, 0);
  return String(maxId + 1).padStart(2, '0');
}

// ========== Preset Management ==========
function loadPresets() {
  try { return JSON.parse(localStorage.getItem(PRESET_KEY)) || []; } catch(e) { return []; }
}
function savePresets(list) { localStorage.setItem(PRESET_KEY, JSON.stringify(list)); }

  el.mainView.classList.toggle('active', name === 'main');
  el.adminView.classList.toggle('active', name === 'admin');
  el.compareView.classList.toggle('active', name === 'compare');
}

let toastTimer;
function toast(msg, dur = 2500) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), dur);
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = String(s ?? '');
  return d.innerHTML.replace(/"/g, '&quot;');
}

function escRegExp(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ========== Render Media Select ==========
function renderSelect() {
  const sorted = [...mediaList].sort((a, b) => (a.sortOrder || 99) - (b.sortOrder || 99));
  el.mediaSelect.innerHTML = '<option value="">-- 媒体を選択してください --</option>';
  sorted.forEach(m => {
    const o = document.createElement('option');
    o.value = m.id;
    o.textContent = m.name;
    el.mediaSelect.appendChild(o);
  });

}

// ========== Media Select Handler ==========
function handleMediaChange() {
  const id = el.mediaSelect.value;

  if (!currentMedia) {
    el.headerCard.style.display = 'none';

    el.footerText.value = '';

  el.footerText.value = currentMedia.footer || '';

  el.footerCard.style.display = 'block';

  updateBmLinks();

// ========== Date Functions ==========
function formatDateString(s) {
  // s = YYYYMMDD
  return s.slice(0,4) + '.' + s.slice(4,6) + '.' + s.slice(6,8);
}

function setTodayDate() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  el.dateInput.value = `${y}${m}${day}`;
  el.datePicker.value = `${y}-${m}-${day}`;
  el.dateError.textContent = '';
}

function syncPickerToInput() {
  const v = el.datePicker.value; // YYYY-MM-DD
  if (v) el.dateInput.value = v.replace(/-/g, '');
  updateBmLinks();
}

function syncInputToPicker() {
  const v = el.dateInput.value.trim();
  if (/^\d{8}$/.test(v)) {
    el.datePicker.value = `${v.slice(0,4)}-${v.slice(4,6)}-${v.slice(6,8)}`;
    el.dateError.textContent = '';

function replaceDate() {
  const s = el.dateInput.value.trim();
  if (!s) { el.dateError.textContent = '日付を入力してください'; return; }
  if (!/^\d{8}$/.test(s)) { el.dateError.textContent = '8桁の数字で入力してください（例: 20260517）'; return; }
  el.dateError.textContent = '';
  const fmt = formatDateString(s);
  el.headerText.value = el.headerText.value.replace(DATE_PATTERN, fmt);
  toast(`日付を ${fmt} に置換しました`);
  updateBmLinks();
}

// ========== Download / Copy ==========
function getFullText() {
  return [el.headerText.value, el.bodyText.value, el.footerText.value]
    .filter(t => t.trim()).join('\n\n');
}

function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type: `${type};charset=utf-8` });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function getFileBaseName() {
  const d = el.dateInput.value.trim();

// ========== Character Check ==========
function checkDepChars() {
  const allText = [el.headerText.value, el.bodyText.value, el.footerText.value]
    .filter(t => t.trim()).join('\n\n');
  const foundChars = DEPENDENT_CHARS.filter(c => allText.includes(c));
  const hasEmoji = /\p{Extended_Pictographic}/u.test(allText);
  const hasIssues = foundChars.length > 0 || hasEmoji;
  const preview = $('depCharPreview');
  el.charCheckResult.style.display = 'block';
  if (hasIssues) {
    const msgParts = [...foundChars];
    if (hasEmoji) msgParts.push('絵文字');
    el.charCheckResult.className = 'char-check-result error';
    el.charCheckResult.textContent = '機種依存文字が見つかりました: ' + msgParts.join(' ');
    const rePatterns = foundChars.map(c => c.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
    rePatterns.push('\\p{Extended_Pictographic}');
    const highlightRe = new RegExp(rePatterns.join('|'), 'gu');
    preview.innerHTML = escHtml(allText).replace(highlightRe, m => `<mark class="dep-char">${m}</mark>`);
    preview.classList.add('show');
  } else {
    el.charCheckResult.className = 'char-check-result ok';
    el.charCheckResult.textContent = 'OK — 機種依存文字は見つかりませんでした';
    preview.classList.remove('show');
    preview.innerHTML = '';
  }
}

// ========== Diff ==========
function computeDiffHtml(before, after) {
  const beforeLines = before.split('\n');
  const afterLines = after.split('\n');
  const maxLen = Math.max(beforeLines.length, afterLines.length);
  let bHTML = '', aHTML = '', changes = 0;
  for (let i = 0; i < maxLen; i++) {
    const bl = beforeLines[i] !== undefined ? beforeLines[i] : '';
    const al = afterLines[i] !== undefined ? afterLines[i] : '';
    if (bl === al) {
      bHTML += escHtml(bl) + '\n';
      aHTML += escHtml(al) + '\n';
    } else {
      changes++;
      bHTML += `<span class="diff-deleted">${escHtml(bl)}</span>\n`;
      aHTML += `<span class="diff-added">${escHtml(al)}</span>\n`;
    }
  }
  return { bHTML, aHTML, changes };
}

// ========== URL変換 ==========
function urlTwoPass(text, converter) {
  const placeholders = [];
  const safe = text.replace(/\$\$:URL_https?:\/\/[^\s$]+:\$\$/g, m => {
    const idx = placeholders.length;
    placeholders.push(m);
    return `\x00PH${idx}\x00`;
  });
  const converted = converter(safe);
  return converted.replace(/\x00PH(\d+)\x00/g, (_, i) => placeholders[+i]);
}

function scanBareUrls(text) {
  const seen = new Set();
  const urls = [];
  const safe = text.replace(/\$\$:URL_https?:\/\/[^\s$]+:\$\$/g, '');
  safe.replace(/https?:\/\/\S+/g, raw => {
    const url = raw.replace(/[.,;:!?)>]+$/, '');
    if (!seen.has(url)) { seen.add(url); urls.push(url); }
  });
  return urls;
}

function openUrlConvertPanel(selectAll) {
  const urls = scanBareUrls(el.bodyText.value);
  if (urls.length === 0) { toast('変換対象のURLが見つかりませんでした'); return; }
  el.urlCheckList.innerHTML = urls.map(url => `
    <label class="url-check-label">
      <input type="checkbox" class="url-check-item" value="${escHtml(url)}" ${selectAll ? 'checked' : ''}>
      <span>${escHtml(url)}</span>
    </label>`).join('');
  el.urlConvertPanel.style.display = 'block';
  el.urlConvertPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function applyUrlConvert() {
  const checked = [...document.querySelectorAll('.url-check-item:checked')].map(cb => cb.value);
  if (checked.length === 0) { toast('URLを選択してください'); return; }
  let text = el.bodyText.value;
  let count = 0;
  for (const url of checked) {
    const wrapped = `$$:URL_${url}:$$`;
    const escaped = url.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    text = urlTwoPass(text, t => t.replace(new RegExp(escaped, 'g'), () => { count++; return wrapped; }));
  }
  el.bodyText.value = text;
  el.urlConvertPanel.style.display = 'none';
  toast(`${count} 件のURLを変換しました`);
  updateBmLinks();
}

// ========== 原稿比較ビュー ==========
function runCompare() {
  const before = el.compareBeforeInput.value;
  const after = el.compareAfterInput.value;
  if (!before && !after) { toast('変更前・変更後のテキストを入力してください'); return; }
  const { bHTML, aHTML, changes } = computeDiffHtml(before, after);
  el.compareDiffCount.textContent = changes;
  el.compareDiffBefore.innerHTML = bHTML;
  el.compareDiffAfter.innerHTML = aHTML;
  el.compareDiffContainer.classList.add('show');
}

// ========== Nametag ==========
function insertTagAtCursor(tag, ta) {
  if (!ta) ta = el.bodyText;
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  ta.value = ta.value.slice(0, start) + tag + ta.value.slice(end);
  ta.selectionStart = ta.selectionEnd = start + tag.length;
  ta.focus();
  if (ta === el.subjectInput) updateBmLinks();
}

function replaceAll() {
  const search = el.searchText.value;
  const tag = el.replaceTag.value;
  if (!search) { showReplaceResult('検索テキストを入力してください', false); return; }
  if (!tag) { showReplaceResult('置換タグを選択してください', false); return; }

  const curr = el.bodyText.value;
  const re = new RegExp(escRegExp(search), 'g');
  const bodyCount = (curr.match(re) || []).length;
  const subjCount = (el.subjectInput.value.match(re) || []).length;
  const total = bodyCount + subjCount;
  if (total === 0) { showReplaceResult('一致する文字列が見つかりませんでした', false); return; }

  if (bodyCount > 0) el.bodyText.value = curr.split(search).join(tag);
  if (subjCount > 0) {
    el.subjectInput.value = el.subjectInput.value.split(search).join(tag);
    updateBmLinks();
  }
  showReplaceResult(`${total} 箇所を置換しました`, true);
}

function showReplaceResult(msg, ok) {
  el.replaceResult.textContent = msg;
  el.replaceResult.style.color = ok ? '#16a34a' : '#dc2626';
  el.replaceResult.style.display = 'block';
  setTimeout(() => { el.replaceResult.style.display = 'none'; }, 3000);
}

// ========== Admin Drag Reorder ==========
function attachDragHandlers() {
  const container = el.mediaListContainer;

  container.addEventListener('dragstart', e => {
    const handle = e.target.closest('.drag-handle');
    if (!handle) { e.preventDefault(); return; }
    const item = handle.closest('.media-item');
    if (!item) return;
    dragId = item.dataset.id;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragId);
    e.dataTransfer.setDragImage(item, 20, 20);
    item.classList.add('dragging');
  });

  container.addEventListener('dragover', e => {
    if (!dragId) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const item = e.target.closest('.media-item');
    if (!item || item.dataset.id === dragId) return;
    container.querySelectorAll('.media-item.drag-over').forEach(el => el.classList.remove('drag-over'));
    item.classList.add('drag-over');
  });

  container.addEventListener('dragleave', e => {
    if (!e.relatedTarget || !container.contains(e.relatedTarget)) {
      container.querySelectorAll('.media-item.drag-over').forEach(el => el.classList.remove('drag-over'));
    }
  });

  container.addEventListener('drop', e => {
    e.preventDefault();
    if (!dragId) return;
    const item = e.target.closest('.media-item');
    if (!item) return;
    const dropId = item.dataset.id;
    if (!dropId || dropId === dragId) return;

    const fromIdx = mediaList.findIndex(m => m.id === dragId);
    const toIdx = mediaList.findIndex(m => m.id === dropId);
    if (fromIdx === -1 || toIdx === -1) return;

    const [moved] = mediaList.splice(fromIdx, 1);
    mediaList.splice(toIdx, 0, moved);
    mediaList.forEach((m, i) => { m.sortOrder = i + 1; });
    saveMedia(mediaList);
    dragId = null;
    renderAdminList();
    renderSelect();
    toast('並び順を変更しました');
  });

  container.addEventListener('dragend', () => {
    dragId = null;
    container.querySelectorAll('.media-item').forEach(el => el.classList.remove('dragging', 'drag-over'));
  });
}

// ========== Import / Export ==========
function mediaToCSV(list) {
  const cols = ['媒体ID','表示順','カラム名','媒体名','配信時刻','配信システム','セグメントID','差出人名','ヘッダー','フッター'];
  const rows = [cols.join(',')];
  for (const m of list) {
    const h = (m.header || '').replace(/\n/g, '\\n');
    const f = (m.footer || '').replace(/\n/g, '\\n');
    rows.push([m.id, m.sortOrder, m.columnName, m.name, m.deliveryTime||'10:00', m.deliverySystem||'MM', m.segmentId||'', m.fromName||'', h, f].join(','));
  }
  return rows.join('\n');
}

function exportData() {
  const csv = '﻿' + mediaToCSV(mediaList); // BOM for Excel UTF-8
  downloadFile(csv, `media_export_${new Date().toISOString().slice(0,10)}.csv`, 'text/csv;charset=utf-8');
  toast('エクスポートしました');
}

function exportJson() {
  downloadFile(JSON.stringify(mediaList, null, 2), 'media.json', 'application/json');
  toast('media.json を書き出しました。GitHubリポジトリのルートにコミットしてください。');
}

function importData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = csvToMedia(e.target.result);
      if (!data.length) throw new Error('データが見つかりません');
      if (!confirm(`${data.length} 件のデータをインポートします。現在のデータは上書きされます。よろしいですか？`)) return;
      saveMedia(data);
      renderAdminList();
      renderSelect();
      toast(`${data.length} 件をインポートしました`);
    } catch(err) {
      toast('インポートエラー: ' + err.message);
    }
  };
  reader.readAsText(file, 'utf-8');
}

function extractSubject() {
  const manual = el.subjectInput.value.trim();
  if (manual) return manual;
  const hdr = el.headerText.value;
  const lines = hdr.split('\n');
  let found = false;
  for (let i = 0; i < lines.length; i++) {
    if (/^[▼▽]?件名[：:]/.test(lines[i].trim())) {
      const after = lines[i].replace(/^.*件名[：:]/, '').trim();
      if (after) return after;
      found = true;
      continue;
    }
    if (found && lines[i].trim()) return lines[i].trim();
  }
  const bodyLines = el.bodyText.value.split('\n');
  return (bodyLines.find(l => l.trim()) || '').trim();
}

async function init() {
  mediaList = await loadMedia();
  renderSelect();
  renderPresets();

  // View switching
  el.adminBtn.addEventListener('click', () => {
    showView('admin');
    renderAdminList();
  });
  el.backToMainBtn.addEventListener('click', () => showView('main'));
  el.compareBtn.addEventListener('click', () => showView('compare'));
  el.backFromCompareBtn.addEventListener('click', () => showView('main'));
  el.runCompareBtn.addEventListener('click', runCompare);

  // Media select
  el.mediaSelect.addEventListener('change', handleMediaChange);

  // Date
  el.todayBtn.addEventListener('click', setTodayDate);
  el.datePicker.addEventListener('change', syncPickerToInput);
  el.dateInput.addEventListener('input', syncInputToPicker);
  el.replaceDateBtn.addEventListener('click', replaceDate);

  // Subject
  el.subjectInput.addEventListener('input', updateBmLinks);

  // Nametag insert buttons
  document.querySelectorAll('.btn-tag').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.target ? $(btn.dataset.target) : null;
      insertTagAtCursor(btn.dataset.tag, target);
    });
  });

  // Body text
  el.bodyText.addEventListener('input', handleBodyChange);

  // Replace
  el.replaceAllBtn.addEventListener('click', replaceAll);
  el.savePresetBtn.addEventListener('click', savePreset);

  // Actions
  el.downloadTextBtn.addEventListener('click', downloadText);
  el.downloadHtmlBtn.addEventListener('click', downloadHtml);
  el.copyBtn.addEventListener('click', copyToClipboard);
  el.checkCharsBtn.addEventListener('click', checkDepChars);

  // URL変換
  el.urlBulkBtn.addEventListener('click', () => openUrlConvertPanel(true));
  el.urlSelectBtn.addEventListener('click', () => openUrlConvertPanel(false));
  el.urlSelectAllBtn.addEventListener('click', () => document.querySelectorAll('.url-check-item').forEach(cb => { cb.checked = true; }));
  el.urlSelectNoneBtn.addEventListener('click', () => document.querySelectorAll('.url-check-item').forEach(cb => { cb.checked = false; }));
  el.urlApplyBtn.addEventListener('click', applyUrlConvert);
  el.closeUrlPanelBtn.addEventListener('click', () => { el.urlConvertPanel.style.display = 'none'; });

  // Admin
  attachDragHandlers();
  el.addMediaBtn.addEventListener('click', addNewMedia);
  $('exportJsonBtn').addEventListener('click', exportJson);
  el.exportBtn.addEventListener('click', exportData);
  el.importBtn.addEventListener('click', () => el.importFile.click());
  el.importFile.addEventListener('change', e => { importData(e.target.files[0]); e.target.value = ''; });

  // Bookmarklet drag links — hrefs are updated dynamically via updateBmLinks()
}

// Expose globals for inline onclick handlers
window.toggleEdit = toggleEdit;
window.saveMediaItem = saveMediaItem;
window.deleteMediaItem = deleteMediaItem;
window.copyMediaItem = copyMediaItem;
window.usePreset = usePreset;
window.deletePreset = deletePreset;
window.copyBmLinkHref = copyBmLinkHref;
window.insertDateTagTo = insertDateTagTo;

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
